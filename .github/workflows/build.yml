name: Build QuizNest

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  #  Windows  (amd64 · NSIS installer)
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Sync frontend to dist
        run: node scripts/sync-dist.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-${{ runner.os }}-rust-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.2 --locked

      - name: Build NSIS installer
        working-directory: src-tauri
        run: cargo tauri build --bundles nsis --ci

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: QuizNest_windows_amd64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ──────────────────────────────────────────────
  #  Android  (arm64-v8a · APK)
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Sync frontend to dist
        run: node scripts/sync-dist.mjs

      - name: Setup JDK 17
        id: java-home
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;26.1.10909125"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android target
        run: rustup target add aarch64-linux-android

      - name: Cache Rust registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target/aarch64-linux-android
          key: android-${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: android-${{ runner.os }}-rust-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.2 --locked

      - name: Build Android APK
        working-directory: src-tauri
        run: cargo tauri android build --target aarch64 --apk --split-per-abi --ci

      - name: Sign APK
        run: |
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk"
          BUILT_APK=$(find "$APK_DIR" -name '*arm64*.apk' | head -n1)
          if [ -z "$BUILT_APK" ]; then echo "ERROR: arm64 APK not found"; exit 1; fi
          echo "Found APK: $BUILT_APK"

          # Ensure debug keystore
          KEYSTORE="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair -v \
              -keystore "$KEYSTORE" -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME/build-tools/"* | sort -V | tail -n1)
          ALIGNED_APK="/tmp/aligned.apk"
          SIGNED_APK="QuizNest_arm64-v8a.apk"

          # zipalign
          "$BUILD_TOOLS/zipalign" -f -p 4 "$BUILT_APK" "$ALIGNED_APK"

          # sign
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE" --ks-key-alias androiddebugkey \
            --ks-pass pass:android --key-pass pass:android \
            --out "$SIGNED_APK" "$ALIGNED_APK"

          # verify
          "$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED_APK"

          echo "APK signed successfully"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: QuizNest_android_arm64-v8a
          path: QuizNest_arm64-v8a.apk
          if-no-files-found: error

  # ──────────────────────────────────────────────
  #  macOS  (Apple Silicon · DMG)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Sync frontend to dist
        run: node scripts/sync-dist.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-${{ runner.os }}-rust-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.2 --locked

      - name: Build DMG
        working-directory: src-tauri
        run: cargo tauri build --bundles dmg --ci

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: QuizNest_macos_apple_silicon
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
